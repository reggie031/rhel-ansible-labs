name: Ansible CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
           sudo dnf update -y
           sudo dnf install -y ansible-core

      - name: Create vault password file
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ~/.vault_pass

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VM2 to known hosts
        run: |
          ssh-keyscan 192.168.10.207 >> ~/.ssh/known_hosts
          ssh-keyscan 192.168.10.116 >> ~/.ssh/known_hosts
          
      - name: Validate Playbook
        run: |
          ansible-playbook --syntax-check -i inventory.ini rhel-vm2.yml

      - name: Deploy to VM2
        run: ansible-playbook -i inventory.ini rhel-vm2.yml --vault-password-file ~/.vault_pass 
